
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | AI Resume Analyzer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            position:relative;
        }

        /* Animated Background Circles */
        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(56,189,248,0.15);
            animation: float 6s infinite ease-in-out;
        }

        .circle1{
            width:250px;
            height:250px;
            top:-80px;
            left:-80px;
        }

        .circle2{
            width:300px;
            height:300px;
            bottom:-120px;
            right:-100px;
            animation-delay:2s;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(20px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        .login-container{
            width:100%;
            max-width:450px;
            padding:20px;
            z-index:10;
        }

        .glass-card{
            background: rgba(255,255,255,0.08);
            border-radius:30px;
            backdrop-filter: blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 8px 32px rgba(0,0,0,0.35);
            padding:50px 40px;
            color:white;
        }

        .logo{
            text-align:center;
            margin-bottom:30px;
        }

        .logo i{
            font-size:60px;
            color:#38bdf8;
        }

        .logo h2{
            margin-top:15px;
            font-weight:700;
        }

        .logo p{
            color:#cbd5e1;
            font-size:14px;
        }

        .form-control{
            background: rgba(255,255,255,0.08);
            border:none;
            color:white;
            padding:14px;
            border-radius:14px;
            margin-bottom:20px;
        }

        .form-control:focus{
            background: rgba(255,255,255,0.12);
            color:white;
            box-shadow:none;
            border:1px solid #38bdf8;
        }

        .form-control::placeholder{
            color:#cbd5e1;
        }

        .input-group-text{
            background: rgba(255,255,255,0.08);
            border:none;
            color:#38bdf8;
            border-radius:14px 0 0 14px;
        }

        .btn-premium{
            width:100%;
            background:#38bdf8;
            border:none;
            padding:14px;
            border-radius:14px;
            color:white;
            font-weight:600;
            transition:0.3s;
        }

        .btn-premium:hover{
            background:#0ea5e9;
            transform:translateY(-2px);
        }

        .register-link{
            text-align:center;
            margin-top:25px;
        }

        .register-link a{
            color:#38bdf8;
            text-decoration:none;
            font-weight:500;
        }

        .register-link a:hover{
            text-decoration:underline;
        }

        .alert{
            border-radius:14px;
            border:none;
        }

    </style>

</head>

<body>

    <!-- Background Effects -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="login-container">

        <div class="glass-card">

            <!-- Logo -->
            <div class="logo">

                <i class="bi bi-robot"></i>

                <h2>
                    AI Resume Analyzer
                </h2>

                <p>
                    Smart Resume Analysis & Job Matching
                </p>

            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}

                {% if messages %}

                    {% for msg in messages %}

                        <div class="alert alert-warning">

                            {{ msg }}

                        </div>

                    {% endfor %}

                {% endif %}

            {% endwith %}

            <!-- Login Form -->
            <form method="POST">

                <!-- Email -->
                <div class="input-group mb-3">

                    <span class="input-group-text">

                        <i class="bi bi-envelope-fill"></i>

                    </span>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter Email"
                        required
                    >

                </div>

                <!-- Password -->
                <div class="input-group mb-4">

                    <span class="input-group-text">

                        <i class="bi bi-lock-fill"></i>

                    </span>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter Password"
                        required
                    >

                </div>

                <!-- Button -->
                <button class="btn-premium">

                    <i class="bi bi-box-arrow-in-right"></i>

                    Login

                </button>

            </form>

            <!-- Register -->
            <div class="register-link">

                Don't have an account?

                <a href="/register">

                    Create Account

                </a>

            </div>

        </div>

    </div>

</body>

</html>
