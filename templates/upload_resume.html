
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Upload Resume</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            overflow:hidden;
            position:relative;
        }

        /* Background Glow */
        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(56,189,248,0.15);
            animation:float 6s infinite ease-in-out;
        }

        .circle1{
            width:280px;
            height:280px;
            top:-100px;
            left:-100px;
        }

        .circle2{
            width:350px;
            height:350px;
            bottom:-150px;
            right:-120px;
            animation-delay:2s;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(20px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        .upload-container{
            width:100%;
            max-width:750px;
            padding:20px;
            z-index:10;
        }

        .glass-card{
            background: rgba(255,255,255,0.08);
            border-radius:30px;
            backdrop-filter: blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 8px 32px rgba(0,0,0,0.35);
            padding:50px;
        }

        .title{
            text-align:center;
            margin-bottom:40px;
        }

        .title i{
            font-size:70px;
            color:#38bdf8;
        }

        .title h1{
            margin-top:20px;
            font-size:42px;
            font-weight:700;
        }

        .title p{
            color:#cbd5e1;
            margin-top:10px;
        }

        .upload-box{
            border:2px dashed rgba(56,189,248,0.5);
            border-radius:25px;
            padding:60px 30px;
            text-align:center;
            transition:0.3s;
            cursor:pointer;
            background: rgba(255,255,255,0.03);
        }

        .upload-box:hover{
            background: rgba(255,255,255,0.06);
            border-color:#38bdf8;
            transform:translateY(-3px);
        }

        .upload-box i{
            font-size:80px;
            color:#38bdf8;
            margin-bottom:20px;
        }

        .upload-box h3{
            font-weight:600;
        }

        .upload-box p{
            color:#cbd5e1;
            margin-top:10px;
        }

        .form-control{
            display:none;
        }

        .btn-premium{
            width:100%;
            background:#38bdf8;
            border:none;
            padding:16px;
            border-radius:16px;
            color:white;
            font-weight:600;
            font-size:18px;
            margin-top:30px;
            transition:0.3s;
        }

        .btn-premium:hover{
            background:#0ea5e9;
            transform:translateY(-2px);
        }

        .file-name{
            margin-top:20px;
            text-align:center;
            color:#38bdf8;
            font-weight:500;
        }

        .info-box{
            margin-top:30px;
            background: rgba(255,255,255,0.05);
            padding:20px;
            border-radius:18px;
        }

        .info-box ul{
            margin-top:10px;
            padding-left:20px;
        }

        .info-box li{
            margin-bottom:10px;
            color:#cbd5e1;
        }

        @media(max-width:768px){

            .glass-card{
                padding:30px;
            }

            .title h1{
                font-size:32px;
            }

        }

    </style>

</head>

<body>

    <!-- Background -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="upload-container">

        <div class="glass-card">

            <!-- TITLE -->
            <div class="title">

                <i class="bi bi-cloud-arrow-up-fill"></i>

                <h1>

                    Upload Your Resume

                </h1>

                <p>

                    AI-powered ATS analysis & smart job matching

                </p>

            </div>

            <!-- FORM -->
            <form method="POST"
                  enctype="multipart/form-data">

                <!-- Upload Box -->
                <label class="upload-box">

                    <i class="bi bi-file-earmark-arrow-up-fill"></i>

                    <h3>

                        Drag & Drop Resume Here

                    </h3>

                    <p>

                        Supported Format: PDF

                    </p>

                    <input
                        type="file"
                        name="resume"
                        id="resumeInput"
                        class="form-control"
                        accept=".pdf"
                        required
                    >

                </label>

                <!-- File Name -->
                <div class="file-name"
                     id="fileName">

                    No file selected

                </div>

                <!-- Button -->
                <button class="btn-premium">

                    <i class="bi bi-cpu-fill"></i>

                    Analyze Resume

                </button>

            </form>

            <!-- INFO -->
            <div class="info-box">

                <h5>

                    📌 Tips for Better ATS Score

                </h5>

                <ul>

                    <li>
                        Add relevant technical skills
                    </li>

                    <li>
                        Use clean resume formatting
                    </li>

                    <li>
                        Include project experience
                    </li>

                    <li>
                        Mention tools & technologies
                    </li>

                </ul>

            </div>

        </div>

    </div>

    <!-- FILE NAME SCRIPT -->
    <script>

        const resumeInput =
            document.getElementById('resumeInput');

        const fileName =
            document.getElementById('fileName');

        resumeInput.addEventListener('change', function(){

            if(this.files.length > 0){

                fileName.textContent =
                    "Selected File: " +
                    this.files[0].name;

            }else{

                fileName.textContent =
                    "No file selected";

            }

        });

    </script>

</body>

</html>
